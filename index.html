<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>마티니 교육 투표</title>
    
    <link rel="icon" href="assets/images/Logo.png" type="image/x-icon">
    <link rel="apple-touch-icon" href="assets/images/Logo.png">

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-container">
        <header>
            <img src="assets/images/Name.png" alt="MARTINI Logo" class="logo-image">
            <p class="subtitle">정규 칵테일 클래스 신청</p>
        </header>

        <section class="section">
            <h2>1. 요일 선택 <span class="limit">(선착순 24명)</span></h2>
            <div class="day-selector">
                <button class="day-btn active" data-day="화요일">화</button>
                <button class="day-btn" data-day="수요일">수</button>
                <button class="day-btn" data-day="목요일">목</button>
            </div>
        </section>

        <section class="section">
            <h2>2. 이름 입력</h2>
            <div class="input-group">
                <input type="text" id="userName" placeholder="이름을 입력하세요">
                <button id="submitBtn">로딩 중...</button>
            </div>
        </section>

        <section class="section list-section">
            <div class="list-header">
                <h2>신청자 목록 (<span id="selectedDayName">화요일</span>)</h2>
                <div class="count-badge"><span id="count">0</span> / 24</div>
            </div>
            <div id="attendeeList" class="attendee-list"></div>
        </section>

        <section class="admin-section">
            <button id="exportBtn" class="admin-btn export">명단 추출</button>
            <button id="resetBtn" class="admin-btn reset">데이터 초기화</button>
            <div id="adminControlGroup" class="admin-btn-group">
                <button id="startBtn" class="admin-btn control start">시작/예약</button>
                <button id="endBtn" class="admin-btn control">신청 마감</button>
            </div>

        </section>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
